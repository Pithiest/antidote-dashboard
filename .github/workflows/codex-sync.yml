name: Apply dashboard redesign

on:
  push:
    paths:
      - .github/workflows/codex-sync.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore dashboard files
        shell: bash
        run: |
          cat .codex-sync/chunk* > /tmp/site-bundle.b64
          base64 --decode /tmp/site-bundle.b64 > /tmp/site-bundle.zip
          python - <<'PY'
          import zipfile
          with zipfile.ZipFile('/tmp/site-bundle.zip') as archive:
              archive.extractall('.')
          PY
          rm -rf .codex-sync .github/workflows/codex-sync.yml
      - name: Commit redesign
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css app.js .codex-sync .github/workflows/codex-sync.yml
          git commit -m "Redesign action console"
          git push
