<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https://gnlvchwbygvexfaoaciv.supabase.co; img-src 'self' data:; style-src 'self'; script-src 'self'; font-src 'self'; base-uri 'none'; form-action 'self'"
    />
    <meta name="description" content="Antidote 私人行动指令台" />
    <title>Antidote</title>
    <link rel="icon" href="./assets/antidote-mark.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=20260611-1" />
    <script type="module" defer src="./app.js?v=20260611-1"></script>
  </head>
  <body class="locked">
    <section class="login-screen" aria-label="网站登录">
      <form id="loginForm" class="login-panel">
        <img src="./assets/antidote-mark.svg" alt="" class="login-mark" />
        <div>
          <h1>Antidote</h1>
          <p>仅陌生设备需要验证</p>
        </div>
        <label class="field">
          <span>网站密码</span>
          <input id="loginPassword" type="password" autocomplete="current-password" required />
        </label>
        <button id="loginButton" class="button primary" type="submit">进入</button>
        <p id="loginStatus" class="system-message" role="status">验证后这台设备会保持登录。</p>
      </form>
    </section>

    <main id="appShell" class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Antidote 首页">
          <img src="./assets/antidote-mark.svg" alt="" />
          <span>
            <strong>Antidote</strong>
            <small id="todayLabel">--</small>
          </span>
        </a>
        <div class="topbar-actions">
          <span id="deviceStatus" class="sync-status">同步中</span>
          <button id="syncButton" class="icon-button" type="button" aria-label="刷新" title="刷新">
            <span aria-hidden="true">↻</span>
          </button>
          <button id="logoutButton" class="icon-button" type="button" aria-label="退出当前设备" title="退出当前设备">
            <span aria-hidden="true">↪</span>
          </button>
        </div>
      </header>

      <section class="command-layout" aria-label="今天的行动">
        <article class="command-panel">
          <header class="command-heading">
            <p>今天最重要的事</p>
            <span id="guidanceState" class="status-mark">读取中</span>
          </header>
          <h1 id="guidanceTitle">正在读取最新记录</h1>
          <p id="guidanceFocus" class="focus-copy">请稍候。</p>
          <p id="guidanceRationale" class="reason-copy"></p>

          <ol id="actionSteps" class="steps" aria-label="现在执行"></ol>

          <div class="primary-actions">
            <button id="episodeButton" class="button danger" type="button">抽动开始</button>
            <button id="checkinButton" class="button primary" type="button">记录变化</button>
          </div>
        </article>

        <aside class="avoid-panel">
          <header>
            <span class="avoid-symbol" aria-hidden="true">!</span>
            <h2>今天不要做</h2>
          </header>
          <ul id="avoidList"></ul>
          <p id="safetyNote" class="safety-note"></p>
        </aside>
      </section>

      <footer class="footer-line">
        <span id="lastSynced">--</span>
        <span>网站仅用于记录和风险分层，不调整处方药。</span>
      </footer>
    </main>

    <div id="checkinModal" class="modal-backdrop" hidden>
      <section class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="checkinTitle" tabindex="-1">
        <header class="modal-header">
          <div>
            <p>约 15 秒</p>
            <h2 id="checkinTitle">今天有什么变化</h2>
          </div>
          <button class="icon-button close-modal" type="button" aria-label="关闭">×</button>
        </header>

        <form id="checkinForm" class="compact-form">
          <fieldset>
            <legend>1. 今天比平常</legend>
            <div class="segmented three">
              <label><input type="radio" name="baseline_change" value="lighter" /><span>更轻</span></label>
              <label><input type="radio" name="baseline_change" value="same" checked /><span>差不多</span></label>
              <label><input type="radio" name="baseline_change" value="worse" /><span>更重</span></label>
            </div>
          </fieldset>

          <fieldset>
            <legend>2. 今天的抽动</legend>
            <div class="stacked-options">
              <label>
                <input type="radio" name="episode_impact" value="none" checked />
                <span><strong>没有抽动</strong></span>
              </label>
              <label>
                <input type="radio" name="episode_impact" value="control_ok" />
                <span><strong>有抽动</strong><small>但右手、右脚和行动仍可控</small></span>
              </label>
              <label>
                <input type="radio" name="episode_impact" value="control_affected" />
                <span><strong>抽动影响了控制</strong><small>右手、右脚、走路或骑行受到影响</small></span>
              </label>
            </div>
          </fieldset>

          <label class="field">
            <span>3. 用一句话描述经过</span>
            <textarea
              name="notes"
              rows="4"
              maxlength="1200"
              placeholder="例如：午睡被紧急叫起，五分钟后骑车时右侧开始大幅抽动。"
            ></textarea>
          </label>

          <div class="modal-actions">
            <button class="button quiet close-modal" type="button">取消</button>
            <button id="saveCheckinButton" class="button primary" type="submit">保存</button>
          </div>
        </form>
      </section>
    </div>

    <div id="episodeModal" class="episode-overlay" hidden>
      <section class="episode-sheet" role="dialog" aria-modal="true" aria-labelledby="episodeTitle" tabindex="-1">
        <header class="episode-header">
          <div>
            <p>发作记录</p>
            <h2 id="episodeTitle">先停止移动并坐稳</h2>
          </div>
          <button id="minimizeEpisode" class="icon-button dark" type="button" aria-label="暂时收起">−</button>
        </header>

        <div id="episodeTimerView" class="episode-timer-view">
          <div id="episodeTimer" class="episode-timer" aria-live="polite">00:00</div>
          <p id="episodeInstruction">
            不继续骑行或硬走。右手、右脚没有恢复到平常状态前，不重新上车。
          </p>
          <button id="finishEpisodeButton" class="button light" type="button">结束计时</button>
        </div>

        <form id="episodeFinishForm" class="episode-finish-form" hidden>
          <fieldset>
            <legend>这次是否影响控制</legend>
            <div class="stacked-options dark-options">
              <label>
                <input type="radio" name="episode_impact" value="control_ok" checked />
                <span><strong>没有影响控制</strong></span>
              </label>
              <label>
                <input type="radio" name="episode_impact" value="control_affected" />
                <span><strong>影响右手、右脚、走路或骑行</strong></span>
              </label>
            </div>
          </fieldset>
          <label class="field dark-field">
            <span>一句话补充</span>
            <textarea name="notes" rows="3" maxlength="1200" placeholder="触发场景、动作幅度或恢复情况"></textarea>
          </label>
          <div class="modal-actions">
            <button id="resumeEpisodeButton" class="button dark-quiet" type="button">继续计时</button>
            <button id="saveEpisodeButton" class="button light" type="submit">保存这次发作</button>
          </div>
        </form>
      </section>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
